# ============================================================
# DEFAULT
server:
  port: 8088
  forward-headers-strategy: framework
  error:
    include-message: always
  servlet:
    session:
      cookie:
        secure: true

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate.enabled: true
    readinessstate.enabled: true

logging:
  pattern:
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd'T'HH:mm:ss}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx{${LOG_STACKTRACE_LIMIT:1}}}"
  level:
    org:
      hibernate:
        sql: debug

spring:
  application:
    name: fundamental-engine
  profiles:
    default: local
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  # ── Old local PostgreSQL (uncomment to use) ──
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/fundamental-engine
  #   username: admin
  #   password: 123456
  #   driver-class-name: org.postgresql.Driver
  #   hikari:
  #     maximum-pool-size: 200
  #     minimum-idle: 5

  # ── CockroachDB Cloud (Singapore) ──
  datasource:
    url: jdbc:postgresql://hungry-dunnart-17395.jxf.gcp-asia-southeast1.cockroachlabs.cloud:26257/fundamental_engine
    username: sphr9999_gmail_com
    password: _jfkDKWVDZPUFi-5YcBung
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Cache: using Caffeine in-memory (no Redis needed)

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  management:
    tracing:
      sampling:
        probability: 1.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    syntaxHighlight:
      theme: "monokai"

log4j:
  logger:
    org:
      hibernate: WARN

# ── VCI API Enrichment Configuration ──
fundamental-engine:
  vci:
    base-url: https://iq.vietcap.com.vn/api/iq-insight-service
    referer: https://trading.vietcap.com.vn/
    origin: https://trading.vietcap.com.vn
    request-delay-ms: 200
    max-retries: 3
    retry-base-delay-ms: 1000
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    circuit-breaker-failure-threshold: 10
    circuit-breaker-reset-ms: 60000
    batch-size: 50

---
# ============================================================
# LOCAL
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# ============================================================
# DEV
spring:
  config:
    activate:
      on-profile: dev

---
# ============================================================
# PROD
spring:
  config:
    activate:
      on-profile: prod

---
# ============================================================
# RENDER (Render.com + Supabase PostgreSQL)
spring:
  config:
    activate:
      on-profile: render

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8088}

management:
  server:
    port: ${PORT:8088}

logging:
  level:
    org.hibernate.sql: WARN
    com.eyelanding: INFO
