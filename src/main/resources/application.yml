# ============================================================
# DEFAULT (dùng cho Render.com deploy)
# ============================================================
server:
  port: ${PORT:10000}
  address: 0.0.0.0
  forward-headers-strategy: framework
  error:
    include-message: always

management:
  server:
    port: ${PORT:10000}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate.enabled: true
    readinessstate.enabled: true

logging:
  pattern:
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:yyyy-MM-dd'T'HH:mm:ss}}){faint} %clr(${LOG_LEVEL_PATTERN:%5p}) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx{${LOG_STACKTRACE_LIMIT:1}}}"
  level:
    org.hibernate.sql: WARN
    com.eyelanding: INFO

spring:
  application:
    name: fundamental-engine

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  # ── CockroachDB Cloud (Singapore) ──
  datasource:
    url: jdbc:postgresql://hungry-dunnart-17395.jxf.gcp-asia-southeast1.cockroachlabs.cloud:26257/fundamental_engine?sslmode=require
    username: sphr9999_gmail_com
    password: _jfkDKWVDZPUFi-5YcBung
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Cache: using Caffeine in-memory (no Redis needed)

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    syntaxHighlight:
      theme: "monokai"

# ── VCI API Enrichment Configuration ──
fundamental-engine:
  vci:
    base-url: https://iq.vietcap.com.vn/api/iq-insight-service
    referer: https://trading.vietcap.com.vn/
    origin: https://trading.vietcap.com.vn
    request-delay-ms: 200
    max-retries: 3
    retry-base-delay-ms: 1000
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
    circuit-breaker-failure-threshold: 10
    circuit-breaker-reset-ms: 60000
    batch-size: 50

---
# ============================================================
# LOCAL (dev trên máy — IntelliJ)
# ============================================================
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8088
  address: 127.0.0.1

management:
  server:
    port: 8088

logging:
  level:
    org.hibernate.sql: debug
    com.eyelanding: DEBUG

---
# ============================================================
# DEV
spring:
  config:
    activate:
      on-profile: dev

---
# ============================================================
# PROD
spring:
  config:
    activate:
      on-profile: prod
